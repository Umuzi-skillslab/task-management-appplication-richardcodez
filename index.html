<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Task manager application">
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>Task Management System</h1>
        </header>
        
        <section class="add-task-section">
            <h2 id="add-new-task">Add New Task</h2>
            <!-- add task form -->
             <form id="task-form">
                <div class="form-grpoup">
                    <label for="title">Task Title</label>
                    <input type="text" name="title" id="title" placeholder="Enter your task title" required>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description" placeholder="Enter your task description">
                </div>

                <div class="form-group">
                    <label for="priority">Priority</label>
                    <select name="priority" id="priority">
                        <option value="1">Low</option>
                        <option value="2">Medium</option>
                        <option value="3">High</option>
                    </select>
                </div>

                <button type="submit" class="add-task-btn">Add Task</button>
             </form>
        </section>
        
        <section>
            <!-- Display Tasks -->
             <h2 id="task-heading">Task List:</h2>

             <div id="task-list" class="task-list" aria-live="polite"></div>
        </section>
        
        <section class="statistics">
            <!-- Display Statistics -->
             <h2 id="statistics-heading">Statistics:</h2>
             <p>Total Tasks: <span id="total-tasks">0</span></p>
             <p>Completed Tasks: <span id="completed-tasks">0</span></p>
             <p>Average Priority: <span id="average-priority">0</span></p>
        </section>
    </main>
    
    <!-- Scripts loaded in wrong order -->
    <!-- <script src="app.js"></script> -->
    <!-- <script src="dom.js"></script> -->
     
    <!-- Missing: module script -->
    <script type="module" src="dom.js"></script>
</body>
</html>
